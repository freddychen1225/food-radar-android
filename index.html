        const isStandalone = window.matchMedia("(display-mode: standalone)").matches || (window.navigator.standalone === true);
        const isAndroid = /Android/i.test(navigator.userAgent);
        const SHARE_URL = "https://freddychen1225.github.io/food-radar-android/?openExternalBrowser=1";

        /* 沒有安裝 LINE 時，可先用 true 測試分享訊息內容 */
        const ANDROID_SHARE_TEST_MODE = true;

        document.addEventListener("DOMContentLoaded", function () {
            renderCuisines(mealCategories);

            window.addEventListener("appinstalled", () => {
                if (isAndroid) {
                    document.getElementById("android-guide").classList.add("show");
                }
            });

            renderSmartCTA();
            checkIOSGuide();
            setupBusuanziFallback();
            registerServiceWorker();
        });

        function registerServiceWorker() {
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker.register("./sw.js")
                        .then((registration) => {
                            console.log("SW registered:", registration.scope);
                            registration.onupdatefound = function () {
                                console.log("Service Worker update found.");
                            };
                        })
                        .catch((error) => {
                            console.error("SW registration failed:", error);
                        });
                });
            }
        }

        function setupBusuanziFallback() {
            if (location.protocol === "file:") {
                const counter = document.getElementById("busuanzi_value_site_pv");
                if (counter) counter.textContent = "本機預覽不顯示";
                return;
            }

            setTimeout(() => {
                const counter = document.getElementById("busuanzi_value_site_pv");
                if (counter && (counter.textContent === "載入中..." || counter.textContent === "...")) {
                    counter.textContent = "暫時無法取得";
                }
            }, 4000);
        }

        function checkIOSGuide() {
            if (isIOS && !isStandalone && !localStorage.getItem("iosGuideShown")) {
                let count = parseInt(localStorage.getItem("searchCount") || "0", 10);
                if (count >= 3) {
                    setTimeout(() => {
                        document.getElementById("ios-guide").classList.add("show");
                    }, 1000);
                }
            }
        }

        function closeIOSGuide() {
            document.getElementById("ios-guide").classList.remove("show");
            localStorage.setItem("iosGuideShown", "true");
        }

        document.getElementById("ios-guide").onclick = function (e) {
            if (e.target === this) closeIOSGuide();
        };

        function openIOSInstallGuide() {
            document.getElementById("ios-guide").classList.add("show");
            const video = document.getElementById("ios-install-video");
            if (video) {
                video.currentTime = 0;
            }
        }

                text = `發現一個超好用的找美食工具！不用下載 App，打開就能用，專治選擇困難症！💊🍔\n\n${SHARE_URL}`;
                confirmMsg = `您即將傳送以下訊息給朋友：\n\n「發現一個超好用的找美食工具！...」\n\n確定要開啟 LINE 嗎？`;
            } else if (type === "random") {
                text = `救星來了！命運決定吃「${foodName}」！以後吃飯不用再問吃什麼，直接用這個神器轉一下！🍱✨\n\n${SHARE_URL}`;
                confirmMsg = `您即將傳送以下訊息給朋友：\n\n「救星來了！命運決定吃 ${foodName}！...」\n\n確定要開啟 LINE 嗎？`;
            }

            if (confirm(confirmMsg)) {
                const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;
                window.location.href = lineUrl;
            }
        }

        function renderSmartCTA() {

                        <div class="smart-cta-icon">📱</div>

                            <div class="smart-cta-label">自家推薦</div>

                        </div>
                    </div>
                    <div class="smart-cta-actions">
                        <button class="smart-cta-btn" onclick="openIOSInstallGuide()">立即查看加入教學</button>

                    <div class="smart-cta-top">

                            <div class="smart-cta-title">已經安裝好了，順手分享給也有選擇障礙的朋友</div>
                            <div class="smart-cta-desc">你現在用的就是桌面版體驗，把它分享出去，就是最直接的成效展示。</div>
                        </div>
                    </div>
                    <div class="smart-cta-actions">
                        <button class="smart-cta-btn green" onclick="shareToFriend('general')">💬 立即推薦朋友</button>
                        <a class="smart-cta-link" href="https://www.threads.net/@freddychen1225" target="_blank" rel="noopener noreferrer">👀 看更多作品</a>
                    </div>
                    <div class="smart-cta-note">後續可把這裡換成合作推薦、小收益連結或品牌展示入口。</div>
                `;
                return;
            }

            if (isAndroid) {
                card.innerHTML = `
                    <div class="smart-cta-top">
                        <div class="smart-cta-icon">📦</div>
                        <div class="smart-cta-content">
                            <div class="smart-cta-label">Android 專屬</div>
                            <div class="smart-cta-title">想分享給 Android 朋友？這裡有中文 APK 下載頁</div>
                            <div class="smart-cta-desc">用中文說明下載與安裝流程，比直接進英文頁面更容易理解。</div>

                    </div>
                    <div class="smart-cta-actions">
                        <a class="smart-cta-btn green" href="download.html">📥 前往 APK 下載頁</a>
                        <button class="smart-cta-link" onclick="shareDownloadPage()">💬 測試 / 傳給朋友</button>
                    </div>
                    <div class="smart-cta-note">若手機尚未安裝 LINE，目前會先顯示測試訊息內容與最終分享網址。</div>
                `;
                return;
            }

            card.innerHTML = `
                <div class="smart-cta-top">
                    <div class="smart-cta-icon">✨</div>
                    <div class="smart-cta-content">
                        <div class="smart-cta-label">自家推薦</div>

                        <div class="smart-cta-desc">你現在看到的是示範型自家 CTA 版位，之後可延伸成合作推薦與變現入口。</div>
                    </div>

                <div class="smart-cta-actions">
                    <button class="smart-cta-btn" onclick="shareToFriend('general')">💬 推薦朋友</button>
                    <a class="smart-cta-link" href="download.html">📥 APK 下載頁</a>
                </div>
                <div class="smart-cta-note">* 後續可在不影響主功能的前提下，加入合作推薦連結與揭露文字。</div>
            `;
        }

        function shareDownloadPage() {
            const downloadUrl = "https://freddychen1225.github.io/food-radar-android/download.html";
            const text = `這是美食雷達 V3.6 的 Android 下載頁，裡面有中文安裝說明，給你參考：\n\n${downloadUrl}`;
            const lineUrl = `https://line.me/R/msg/text/?${encodeURIComponent(text)}`;

            console.log("Android 分享文字：", text);
            console.log("LINE 分享連結：", lineUrl);

            if (ANDROID_SHARE_TEST_MODE) {
                alert(
                    "【測試模式】目前不直接開啟 LINE。\n\n" +
                    "準備分享的訊息如下：\n\n" +
                    text +
                    "\n\n----------------------\nLINE 分享連結：\n" +
                    lineUrl
                );
                return;
            }

            const confirmMsg = `您即將傳送 Android APK 下載頁給朋友。\n\n確定要開啟 LINE 嗎？`;
            if (confirm(confirmMsg)) {
                window.location.href = lineUrl;
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            const btnMeal = document.getElementById("btn-meal");
            const btnDrink = document.getElementById("btn-drink");
            const btnSpecial = document.getElementById("btn-special");
            const body = document.body;

            btnMeal.className = "mode-btn";
            btnDrink.className = "mode-btn";
            btnSpecial.className = "mode-btn";
            body.classList.remove("drink-mode", "special-mode");

            if (mode === "meal") {
                btnMeal.className = "mode-btn active-meal";
                renderCuisines(mealCategories);
            } else if (mode === "drink") {
                btnDrink.className = "mode-btn active-drink";
                body.classList.add("drink-mode");
                renderCuisines(drinkCategories);
            } else if (mode === "special") {
                btnSpecial.className = "mode-btn active-special";
                body.classList.add("special-mode");
                renderCuisines(specialCategories);
            }

            selectedCuisineKeyword = "";
        }

        function renderCuisines(list) {
            const container = document.getElementById("cuisine-container");
            container.innerHTML = "";

            list.forEach(item => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.type = "button";
                btn.innerHTML = `<span class="icon">${item.icon}</span>${item.name}`;
                btn.dataset.name = item.name;

                btn.addEventListener("click", function () {
                    const allBtns = container.querySelectorAll(".option-btn");
                    allBtns.forEach(b => b.classList.remove("selected"));
                    this.classList.add("selected");
                    selectedCuisineKeyword = item.name;
                });

                container.appendChild(btn);
            });
        }

        function selectScenario(btn) {
            const container = document.getElementById("scenario-container");
            const allBtns = container.querySelectorAll(".option-btn");
            allBtns.forEach(b => b.classList.remove("selected"));
            btn.classList.add("selected");
            selectedScenarioKeyword = btn.getAttribute("data-keyword");
        }

        function goSearch() {
            if (!selectedCuisineKeyword) {
                let typeName = "正餐";
                if (currentMode === "drink") typeName = "點心";
                if (currentMode === "special") typeName = "特殊需求";
                const randomHint = currentMode === "special" ? "" : "，或按「🎲 幫我選」";
                alert(`請先選擇${typeName}類型${randomHint}！`);
                return;
            }

            performSearch(selectedCuisineKeyword);
        }

        function goRandom() {
            if (currentMode === "special") return;

            const container = document.getElementById("cuisine-container");
            const options = container.querySelectorAll(".option-btn");
            const randomIndex = Math.floor(Math.random() * options.length);
            const selectedBtn = options[randomIndex];
            const keyword = selectedBtn.dataset.name;

            options.forEach(b => b.classList.remove("selected"));
            selectedBtn.classList.add("selected");
            selectedCuisineKeyword = keyword;

            setTimeout(() => {
                const modal = document.getElementById("random-result-modal");
                document.getElementById("random-result-text").innerText = keyword;

                document.getElementById("btn-go-random").onclick = function () {
                    modal.classList.remove("show");
                    performSearch(keyword);
                };

                document.getElementById("btn-share-random").onclick = function () {
                    shareToFriend("random", keyword);
                };

                modal.classList.add("show");
            }, 100);
        }

        function performSearch(keyword) {
            let count = parseInt(localStorage.getItem("searchCount") || "0", 10);
            localStorage.setItem("searchCount", count + 1);

            let query = keyword;
            if (selectedScenarioKeyword) {
                query += " " + selectedScenarioKeyword;
            }

            const mapUrl = `https://www.google.com/maps/search/${encodeURIComponent(query)}`;

            if (isIOS && isStandalone) {
                window.location.href = mapUrl;
            } else {
                window.open(mapUrl, "_blank", "noopener,noreferrer");
            }
        }
    </script>
